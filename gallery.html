<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery Memories 💖</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body class="fade-page">

<div id="loader">
    <div class="loader-content">
        <img src="asset/kelulusan_bubu.png">
        <h2>💖 Loading Memories... 💖</h2>
    </div>
</div>

<div class="gallery-container">

    <div class="gallery-title">
        <div class="gallery-badge">📸 Memory Wall</div>
        <h1>Kenangan <span>Terlucu 💖</span></h1>
        <p>Semua foto ini adalah bagian dari cerita indah ✨</p>
    </div>

    <div class="gallery-grid">
        <div class="photo-card"><img src="asset/gambar1.jpeg"><p>Hari paling seru 🌸</p></div>
        <div class="photo-card"><img src="asset/gambar2.jpeg"><p>Kenangan terbaik 💖</p></div>
        <div class="photo-card"><img src="asset/gambar3.jpeg"><p>Ternyata kita sejauh ini ✨</p></div>
        <div class="photo-card"><img src="asset/gambar4.jpeg"><p>Senyum paling manis 🎀</p></div>
        <div class="photo-card"><img src="asset/gambar5.jpeg"><p>Moment yang dirindukan 🌷</p></div>
        <div class="photo-card"><img src="asset/gambar6.jpeg"><p>Cerita indah kita 💕</p></div>
    </div>

    <div class="button-group">
        <a href="index.html" class="pink-btn">⬅ Kembali</a>
    </div>

</div>

<script>
window.onload = () => {
    const loader = document.getElementById("loader");
    setTimeout(() => {
        loader.style.opacity = "0";
        setTimeout(() => loader.style.display = "none", 1000);
    }, 1500);
};
</script>

<script src="music.js"></script>

</body>
</html>
